<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/scorr-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Phase 3: PWA + native app metadata -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b1120" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scorr" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <title>Scorr — scorr.walfia.ai</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('scorr-theme');
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = pref === 'light' || pref === 'dark' ? pref : (dark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          if (pref) document.documentElement.setAttribute('data-theme-pref', pref);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
