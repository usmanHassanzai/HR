# Scorr — scorr.walfia.ai
server {
    listen 80;
    listen [::]:80;
    server_name scorr.walfia.ai;

    root /var/www/scorr/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
